spring.application.name=DocMind

# === Chat 模型配置（OpenAI 兼容协议） ===
# 支持的厂商示例：
#   智谱:       base-url=https://open.bigmodel.cn/api/paas/v4/  model=glm-4-flash
#   MiniMax:   base-url=https://api.minimaxi.com/v1            model=MiniMax-M2.7
#   DeepSeek:  base-url=https://api.deepseek.com               model=deepseek-chat
#   Moonshot:  base-url=https://api.moonshot.cn/v1             model=moonshot-v1-8k
#   OpenAI:    base-url=https://api.openai.com/v1              model=gpt-4o
#   Qwen:      https://dashscope.aliyuncs.com/compatible-mode/v1              model=gpt-4o
docmind.chat.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
docmind.chat.api-key=${DASHSCOPE_API_KEY}
docmind.chat.model=qwen3-max

# === Embedding 模型配置 ===
# provider 可选值: openai-compatible, dashscope, zhipu
#   openai-compatible: 通过 OpenAI 兼容接口调用（支持智谱/DeepSeek/Moonshot 等）
#   dash scope:        阿里 DashScope（Qwen 系列）
#   zhipu:            智谱专用接口
docmind.embedding.provider=dashscope
docmind.embedding.api-key=${DASHSCOPE_API_KEY}
docmind.embedding.model=text-embedding-v4
docmind.embedding.base-url=https://dashscope.aliyuncs.com/compatible-mode/v1
docmind.embedding.dimensions=1024

# 向量存储配置
docmind.embedding.table=doc_embedding
docmind.embedding.dimension=1024

# Active profile: h2 (default) or pgsql
spring.profiles.active=pgsql

# 文件上传路径（通过环境变量配置，默认值为 ./docmind-storage）
docmind.storage.path=${DOCMIND_STORAGE_PATH:./docmind-storage}
# 单个文件上传大小限制单位：MB
docmind.storage.max-file-size=30

# JWT Configuration（通过环境变量配置）
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS Configuration
docmind.cors.allowed-origins=${DOCMIND_CORS_ORIGINS:*}
